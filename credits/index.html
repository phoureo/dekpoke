<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DEKPOKE End Credits</title>
  <style>
    :root {
      --bg: #050612;
      --panel: rgba(10, 14, 38, .72);
      --gold: #ffd66b;
      --cyan: #64eaff;
      --pink: #ff79da;
      --text: #fbf7ff;
      --muted: #aeb6e8;
      --line: rgba(255,255,255,.16);
      --speed: 105s;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); font-family: Tahoma, Arial, sans-serif; overflow: hidden; }
    body::before {
      content: ""; position: fixed; inset: 0; z-index: -4;
      background:
        radial-gradient(circle at 15% 18%, rgba(100,234,255,.22), transparent 28%),
        radial-gradient(circle at 85% 12%, rgba(255,121,218,.20), transparent 30%),
        radial-gradient(circle at 50% 92%, rgba(255,214,107,.15), transparent 28%),
        linear-gradient(180deg, #070816, #10143a 48%, #050612);
    }
    body::after {
      content: ""; position: fixed; inset: 0; z-index: -3; opacity: .32;
      background-image: linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 34px 34px;
      transform: perspective(420px) rotateX(58deg) translateY(10%); transform-origin: bottom;
    }
    .stars, .stars::before, .stars::after { content: ""; position: fixed; inset: 0; pointer-events: none; background-repeat: repeat; }
    .stars { z-index: -2; opacity: .52; background-image: radial-gradient(circle, rgba(255,255,255,.85) 0 1px, transparent 1.6px), radial-gradient(circle, rgba(100,234,255,.65) 0 1px, transparent 1.6px); background-size: 120px 120px, 185px 185px; animation: drift 38s linear infinite; }
    .stars::before { background-image: radial-gradient(circle, rgba(255,214,107,.78) 0 1px, transparent 1.6px); background-size: 240px 240px; animation: drift 60s linear infinite reverse; opacity: .7; }
    .scanlines { position: fixed; inset: 0; z-index: 10; pointer-events: none; opacity: .22; background: repeating-linear-gradient(to bottom, rgba(255,255,255,.035) 0, rgba(255,255,255,.035) 1px, transparent 3px, transparent 7px); mix-blend-mode: overlay; }
    .vignette { position: fixed; inset: 0; z-index: 9; pointer-events: none; background: radial-gradient(circle, transparent 42%, rgba(0,0,0,.68) 100%); }
    .screen { width: 100vw; height: 100vh; display: grid; place-items: center; padding: 28px 14px; overflow: hidden; }
    .credit-window { width: min(930px, 94vw); height: min(900px, 92vh); position: relative; overflow: hidden; border-radius: 28px; border: 2px solid rgba(100,234,255,.48); background: linear-gradient(180deg, rgba(7,9,27,.60), rgba(8,10,30,.36)); box-shadow: 0 0 0 7px rgba(255,255,255,.035), 0 0 34px rgba(100,234,255,.18), inset 0 0 34px rgba(255,255,255,.04); }
    .credit-window::before, .credit-window::after { content: ""; position: absolute; left: 0; right: 0; height: 25%; z-index: 4; pointer-events: none; }
    .credit-window::before { top: 0; background: linear-gradient(to bottom, rgba(5,6,18,1), rgba(5,6,18,0)); }
    .credit-window::after { bottom: 0; background: linear-gradient(to top, rgba(5,6,18,1), rgba(5,6,18,0)); }
    .credits-roll { width: min(760px, 84vw); margin-inline: auto; text-align: center; padding: 92vh 12px 74vh; animation: roll var(--speed) linear infinite; will-change: transform; }
    .credit-window:hover .credits-roll { animation-play-state: paused; }
    .kicker { color: var(--cyan); letter-spacing: .25em; text-transform: uppercase; font-size: clamp(.78rem, 1.8vw, 1rem); margin-bottom: 14px; text-shadow: 0 0 14px rgba(100,234,255,.8); }
    .main-title { margin: 0; color: var(--gold); font-size: clamp(2.5rem, 8vw, 5.4rem); line-height: 1; letter-spacing: .04em; text-shadow: 0 4px 0 rgba(99,52,0,.75), 0 0 22px rgba(255,214,107,.58); }
    .subtitle { margin: 18px auto 76px; color: var(--muted); font-size: clamp(1rem, 2.5vw, 1.35rem); line-height: 1.75; }
    .section { margin: 0 auto 78px; max-width: 720px; }
    .section-title { display: inline-block; margin: 0 0 26px; padding: 10px 22px 12px; color: #050612; background: linear-gradient(90deg, var(--cyan), var(--gold), var(--pink)); border-radius: 999px; font-size: clamp(1rem, 2.9vw, 1.44rem); letter-spacing: .12em; text-transform: uppercase; box-shadow: 0 0 24px rgba(100,234,255,.22); }
    .role { margin-bottom: 26px; }
    .role-name { color: var(--cyan); font-size: clamp(1.02rem, 2.6vw, 1.46rem); line-height: 1.5; letter-spacing: .04em; text-shadow: 0 0 13px rgba(100,234,255,.34); }
    .person, .item { color: var(--text); font-size: clamp(1.08rem, 3vw, 1.68rem); font-weight: 700; line-height: 1.55; margin-top: 3px; text-shadow: 0 0 12px rgba(255,255,255,.18); }
    .note { color: var(--muted); font-size: clamp(.94rem, 2.2vw, 1.16rem); line-height: 1.85; margin-top: 8px; }
    .list { display: grid; gap: 13px; }
    .pill-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 14px; }
    .pill { border: 1px solid var(--line); background: rgba(255,255,255,.055); border-radius: 999px; padding: 10px 15px; color: var(--text); font-size: clamp(.9rem, 2vw, 1.1rem); }
    .supporter-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
    .support-card { min-height: 120px; padding: 18px 14px; border: 1px solid var(--line); border-radius: 22px; background: var(--panel); box-shadow: inset 0 0 18px rgba(255,255,255,.035); }
    .support-card strong { display: block; margin-bottom: 12px; color: var(--gold); font-size: 1.02rem; letter-spacing: .06em; }
    .support-card span { display: block; color: var(--text); font-size: 1.08rem; line-height: 1.7; }
    .legal { color: var(--muted); font-size: clamp(.86rem, 2vw, 1.05rem); line-height: 1.85; }
    .end-mark { margin-top: 42px; color: var(--gold); font-size: clamp(1.8rem, 6vw, 4rem); font-weight: 900; letter-spacing: .14em; text-shadow: 0 0 26px rgba(255,214,107,.62); }
    .hint { position: fixed; left: 50%; bottom: 12px; transform: translateX(-50%); z-index: 12; color: rgba(255,255,255,.58); font-size: 12px; letter-spacing: .08em; }
    @keyframes roll { from { transform: translateY(0); } to { transform: translateY(-100%); } }
    @keyframes drift { from { background-position: 0 0, 0 0; } to { background-position: 0 900px, 400px 1200px; } }
    @media (max-width: 680px) { .supporter-grid { grid-template-columns: 1fr; } .credit-window { border-radius: 22px; } .credits-roll { width: 90vw; } }
    @media (prefers-reduced-motion: reduce) { .credits-roll, .stars, .stars::before { animation: none; } body { overflow: auto; } .screen { height: auto; min-height: 100vh; } .credit-window { height: auto; overflow: visible; } .credits-roll { padding: 80px 12px; } }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="screen">
    <main class="credit-window" aria-label="DEKPOKE End Credits">
      <div id="creditsRoll" class="credits-roll"></div>
    </main>
  </div>
  <div class="scanlines"></div>
  <div class="vignette"></div>
  <div class="hint">HOVER TO PAUSE / แตะค้างเพื่อหยุดชั่วคราว</div>
  <script src="credits-data.js"></script>
  <script src="credits.js"></script>
</body>
</html>
